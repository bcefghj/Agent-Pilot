version: "3.9"
services:
  larkmentor:
    build: .
    container_name: agent-pilot-v7
    restart: unless-stopped
    ports:
      - "8001:8001"    # dashboard + api
      - "8002:8002"    # sync (y-websocket)
      - "8767:8767"    # mcp http
    environment:
      - LARKMENTOR_HOME=/data/agent-pilot
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - LARKMENTOR_PILOT_SHARE_SECRET=${LARKMENTOR_PILOT_SHARE_SECRET:-default-secret}
      - LARKMENTOR_USE_V3_MAIN_CHAIN=1
    volumes:
      - agent-pilot-data:/data
      - ./.larkmentor:/app/.larkmentor:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
  redis:
    image: redis:7-alpine
    container_name: larkmentor-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
volumes:
  agent-pilot-data: {}
  redis-data: {}
